<!DOCTYPE html>
<html>
<head>
    <title>Electronics Store</title>

    {% load static %}
<link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<nav>

    <div class="logo">
        Electronics Store
    </div>

    <ul>

        <li>
            <a href="/">Home</a>
        </li>

        <li>
            <a href="/cart/">🛒 Cart</a>
        </li>

        {% if user.is_authenticated %}

        <li>
            <a href="/logout/">Logout</a>
        </li>

        {% else %}

        <li>
            <a href="/login/">Login</a>
        </li>

        <li>
            <a href="/register/">Register</a>
        </li>

        {% endif %}

    </ul>

</nav>


<div class="container">

{% block content %}

{% endblock %}

</div>

</body>
</html>
<footer>

<p>
© 2026 Electronics Store
</p>

</footer>

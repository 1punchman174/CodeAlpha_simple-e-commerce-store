{% extends 'base.html' %}

{% block content %}

<div class="detail">

    <img src="{{ product.image.url }}">

    <div>

        <h2>{{ product.name }}</h2>

        <p>{{ product.description }}</p>

        <h3>₹{{ product.price }}</h3>

        <a class="btn"
           href="{% url 'add_to_cart' product.id %}">
           Add To Cart
        </a>

    </div>

</div>

{% endblock %}

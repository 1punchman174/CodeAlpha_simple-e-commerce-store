{% extends 'base.html' %}

{% block content %}
    <form method="GET">

    <input
        type="text"
        name="q"
        placeholder="Search electronics..."
    >

    <button class="btn">
        Search
    </button>

</form>
<div class="container">
  
    <div class="products">
        {% for product in products %}
        <div class="card">

            <img src="{{ product.image.url }}" alt="{{ product.name }}">

            <div class="card-content">
                <h3>{{ product.name }}</h3>

                <p class="price">₹{{ product.price }}</p>

                <a href="{% url 'product_detail' product.id %}" class="btn">
                    View Details
                </a>
            </div>

        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
